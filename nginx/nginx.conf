worker_processes auto;

events {
  worker_connections 256; #not expecting many concurrent connections
}

http {

  include /etc/nginx/mime.types;
  default_type application/octet-stream; #sane mime fallback type

  client_max_body_size 0; # allow unlimited file size

  client_body_timeout 24h; #allow long uploads
  send_timeout 24h;

  sendfile on; #performance
  server_tokens off; #hide nginx version

  # gzip compress
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types
  text/plain
  text/css
  application/json
  application/javascript
  application/xml
  text/xml
  image/svg+xml
  font/ttf
  font/woff
  font/woff2;

  server {

    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always; #prevent clickjacking change fi we need to embed in an iframe
    add_header X-Content-Type-Options "nosniff" always; # prevent mime sniffing
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # prevent sending full url in header to other sites

    # prevent stale content being served from cache after update
    location = /index.html {
      expires -1;
      add_header Cache-Control "no-cache";
    }

    # api proxy
    location /api/ {

      proxy_pass http://backend:8000/;

      proxy_http_version 1.1;

      proxy_set_header Host $host; 
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_request_buffering off; #stream directlty instead of filling disk to prevent 413
      proxy_buffering on; 

      # websockets if we add them 
      #proxy_set_header Upgrade $http_upgrade;
      #proxy_set_header Connection "upgrade";

      proxy_connect_timeout 1m; #allow long uploads
      proxy_send_timeout 24h; #allow long uploads
      proxy_read_timeout 24h;# allow long uploads
    }

    # cache hashed static react stuff
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {

      expires 1M;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # React spa routing and fallback to index.html for non-api routes
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
